<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pisii tengikk<3</title>
  

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: url('back.png') no-repeat center center;
      background-size: cover;
      position: relative;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* overlay gelap */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: -1;
    }

    .container {
      width: 90%;
      max-width: 1000px;
      background: rgba(0,0,0,0.4);
      border-radius: 15px;
      padding: 20px;
      display: flex;
      gap: 20px;
      position: relative;
      z-index: 1;
    }

    .left {
      flex: 1;
    }

    .right {
      flex: 1;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border-radius: 10px;
      padding: 15px;
      overflow-y: auto;
      max-height: 400px;
    }

    .lyrics-line {
      opacity: 0.6;
      transition: all 0.3s ease;
      padding: 6px 0;
      color: rgba(255,255,255,0.7);
      text-shadow: 0 0 5px rgba(0,0,0,0.8);
    }

    .active {
      opacity: 1;
      color: #00ffd5;
      font-weight: bold;
      transform: scale(1.05);
    }

    audio {
      width: 100%;
      margin-top: 20px;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="left">
    <h2>Shape of My Heart</h2>
    <p>Lucu tidaaaaaa?????</p>

    <audio id="audio" controls>
      <source src="musek.mp3" type="audio/mpeg">
    </audio>
  </div>

  <div class="right" id="lyricsBox"></div>
</div>

<script>
// Format: [time (detik), text]
const lyrics = [
  [0, "I'm lookin' back on things I've done"],
  [6, "I never wanna play the same old part"],
  [12, "I'll keep you in the dark (keep you in the dark)"],
  [16, "Now let me show you the shape of my heart"],
  [20, "Looking back on the things I've done"],
  [24, "I was trying to be someone (trying to be someone)"],
  [31, "I played my part, kept you in the dark"],
  [34, "Now let me show you the shape of my heart"],
  [40, "Looking back on the things I've done"],
  [44, "I was trying to be someone"],
  [49, "I played my part, kept you in the dark"],
  [54, "Now let me show you the shape of"]
];

const audio = document.getElementById('audio');
const box = document.getElementById('lyricsBox');

// render lyrics
lyrics.forEach((line, index) => {
  const div = document.createElement('div');
  div.classList.add('lyrics-line');
  div.setAttribute('data-time', line[0]);
  div.innerText = line[1];
  box.appendChild(div);
});

const lines = document.querySelectorAll('.lyrics-line');

// sync + auto scroll
audio.addEventListener('timeupdate', () => {
  let currentTime = audio.currentTime;

  lines.forEach((line, i) => {
    let time = parseFloat(line.getAttribute('data-time'));

    if (currentTime >= time) {
      lines.forEach(l => l.classList.remove('active'));
      line.classList.add('active');

      // auto scroll
      //line.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  });
});
</script>

</body>
</html>
